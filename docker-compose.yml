version: "3.9"

services:

  # ─── Relational DB (orders, positions, strategy config, audit) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_net

  # ─── Time-Series DB (OHLCV bars, tick data) ─────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: nexus_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TIMESCALE_DB}
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER} -d ${TIMESCALE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_net

  # ─── Event Bus (Redis Streams) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_net

  # ─── Liquibase DB migrations (runs once and exits) ──────────────────────────
  liquibase:
    image: liquibase/liquibase:4.27
    container_name: nexus_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/changelogs:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      --username=${POSTGRES_USER}
      --password=${POSTGRES_PASSWORD}
      --changeLogFile=db.changelog-master.xml
      update
    networks:
      - nexus_net

volumes:
  postgres_data:
  timescale_data:
  redis_data:

networks:
  nexus_net:
    driver: bridge
